<svg xmlns="http://www.w3.org/2000/svg" width="800" height="1100" viewBox="0 0 800 1100">
  <rect width="800" height="1100" fill="#faf9f7"/>
  <text x="400" y="50" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="700" fill="#1a1a1a">10 agent evals for AI engineers</text>
  <text x="400" y="80" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#666">explained with usage</text>
  
  <!-- Card 1 -->
  <rect x="30" y="110" width="360" height="160" rx="16" fill="#f0e6ff" stroke="#d4bfff"/>
  <text x="50" y="140" font-family="system-ui" font-size="16" font-weight="600" fill="#5b21b6">1. Golden set</text>
  <text x="50" y="165" font-family="system-ui" font-size="13" fill="#4c1d95">20 cases you never change</text>
  <rect x="50" y="190" width="20" height="20" rx="4" fill="#7c3aed"/>
  <rect x="75" y="190" width="20" height="20" rx="4" fill="#7c3aed"/>
  <rect x="100" y="190" width="20" height="20" rx="4" fill="#7c3aed"/>
  <rect x="125" y="190" width="20" height="20" rx="4" fill="#c4b5fd"/>
  <rect x="150" y="190" width="20" height="20" rx="4" fill="#c4b5fd"/>
  <text x="50" y="240" font-family="system-ui" font-size="12" fill="#6b21a8">baseline that tells you if anything moved</text>
  
  <!-- Card 2 -->
  <rect x="410" y="110" width="360" height="160" rx="16" fill="#ecfdf5" stroke="#a7f3d0"/>
  <text x="430" y="140" font-family="system-ui" font-size="16" font-weight="600" fill="#065f46">2. LLM as judge</text>
  <text x="430" y="165" font-family="system-ui" font-size="13" fill="#047857">a model grades against a rubric</text>
  <text x="430" y="210" font-family="system-ui" font-size="14" fill="#064e3b">output → draft → judge 8.6</text>
  <text x="430" y="240" font-family="system-ui" font-size="12" fill="#047857">for open-ended answers</text>
  
  <!-- Card 3 -->
  <rect x="30" y="290" width="360" height="160" rx="16" fill="#fef3c7" stroke="#fde68a"/>
  <text x="50" y="320" font-family="system-ui" font-size="16" font-weight="600" fill="#92400e">3. Rubric scoring</text>
  <text x="50" y="345" font-family="system-ui" font-size="13" fill="#b45309">one number per dimension</text>
  <text x="50" y="380" font-family="system-ui" font-size="13" fill="#78350f">correctness ████████░░</text>
  <text x="50" y="400" font-family="system-ui" font-size="13" fill="#78350f">tone        ██████░░░░</text>
  <text x="50" y="420" font-family="system-ui" font-size="13" fill="#78350f">safety     █████████░</text>
  <text x="50" y="440" font-family="system-ui" font-size="13" fill="#78350f">cost       █████░░░░░</text>
  
  <!-- Card 4 -->
  <rect x="410" y="290" width="360" height="160" rx="16" fill="#fee2e2" stroke="#fecaca"/>
  <text x="430" y="320" font-family="system-ui" font-size="16" font-weight="600" fill="#991b1b">4. Trajectory eval</text>
  <text x="430" y="345" font-family="system-ui" font-size="13" fill="#b91c1c">grade the path, not the answer</text>
  <circle cx="450" cy="390" r="10" fill="#ef4444"/>
  <circle cx="490" cy="390" r="10" fill="#ef4444"/>
  <circle cx="530" cy="390" r="10" fill="#ef4444"/>
  <circle cx="570" cy="390" r="10" fill="#fca5a5"/>
  <circle cx="610" cy="390" r="10" fill="#fecaca"/>
  <text x="430" y="430" font-family="system-ui" font-size="12" fill="#7f1d1d">step 4 called the wrong tool</text>
  
  <!-- Card 5 -->
  <rect x="30" y="470" width="360" height="160" rx="16" fill="#e0f2fe" stroke="#bae6fd"/>
  <text x="50" y="500" font-family="system-ui" font-size="16" font-weight="600" fill="#075985">5. Tool unit tests</text>
  <text x="50" y="525" font-family="system-ui" font-size="13" fill="#0369a1">test the hands, not the brain</text>
  <text x="50" y="560" font-family="system-ui" font-size="13" fill="#0c4a6e">read() ✓  search() ✓  fetch() ✓</text>
  <text x="50" y="585" font-family="system-ui" font-size="13" fill="#0c4a6e">write() ✓  exec() ✗  diff() ✓</text>
  <text x="50" y="615" font-family="system-ui" font-size="12" fill="#0369a1">most agent bugs are tool bugs</text>
  
  <!-- Card 6 -->
  <rect x="410" y="470" width="360" height="160" rx="16" fill="#f3e8ff" stroke="#e9d5ff"/>
  <text x="430" y="500" font-family="system-ui" font-size="16" font-weight="600" fill="#6b21a8">6. Regression suite</text>
  <text x="430" y="525" font-family="system-ui" font-size="13" fill="#7e22ce">did the new prompt break turn 4</text>
  <rect x="440" y="550" width="30" height="50" fill="#22c55e"/>
  <rect x="480" y="560" width="30" height="40" fill="#22c55e"/>
  <rect x="520" y="570" width="30" height="30" fill="#ef4444"/>
  <rect x="560" y="555" width="30" height="45" fill="#22c55e"/>
  <text x="430" y="620" font-family="system-ui" font-size="12" fill="#581c87">case 3 regressed</text>
  
  <!-- Card 7 -->
  <rect x="30" y="650" width="360" height="160" rx="16" fill="#fce7f3" stroke="#fbcfe8"/>
  <text x="50" y="680" font-family="system-ui" font-size="16" font-weight="600" fill="#9d174d">7. A/B in prod</text>
  <text x="50" y="705" font-family="system-ui" font-size="13" fill="#be185d">real traffic, split live</text>
  <text x="50" y="750" font-family="system-ui" font-size="18" font-weight="600" fill="#831843">A 62%   B 38%</text>
  <text x="50" y="790" font-family="system-ui" font-size="12" fill="#9d174d">compare outcomes, not vibes</text>
  
  <!-- Card 8 -->
  <rect x="410" y="650" width="360" height="160" rx="16" fill="#fef9c3" stroke="#fef08a"/>
  <text x="430" y="680" font-family="system-ui" font-size="16" font-weight="600" fill="#854d0e">8. Human review</text>
  <text x="430" y="705" font-family="system-ui" font-size="13" fill="#a16207">sample it, do not read all</text>
  <text x="430" y="755" font-family="system-ui" font-size="14" fill="#713f12">📄📄📄 → reviewed</text>
  <text x="430" y="790" font-family="system-ui" font-size="12" fill="#854d0e">calibrate your judge</text>
  
  <!-- Card 9 -->
  <rect x="30" y="830" width="360" height="160" rx="16" fill="#ccfbf1" stroke="#99f6e4"/>
  <text x="50" y="860" font-family="system-ui" font-size="16" font-weight="600" fill="#0f766e">9. Shadow run</text>
  <text x="50" y="885" font-family="system-ui" font-size="13" fill="#0d9488">the candidate runs, nobody sees it</text>
  <text x="50" y="930" font-family="system-ui" font-size="13" fill="#115e59">live  ─────────────</text>
  <text x="50" y="955" font-family="system-ui" font-size="13" fill="#115e59">shadow ··········· (unseen)</text>
  <text x="50" y="980" font-family="system-ui" font-size="12" fill="#0f766e">same input, zero user impact</text>
  
  <!-- Card 10 -->
  <rect x="410" y="830" width="360" height="160" rx="16" fill="#ede9fe" stroke="#ddd6fe"/>
  <text x="430" y="860" font-family="system-ui" font-size="16" font-weight="600" fill="#5b21b6">10. Red team</text>
  <text x="430" y="885" font-family="system-ui" font-size="13" fill="#6d28d9">try to break it before they do</text>
  <text x="430" y="925" font-family="system-ui" font-size="13" fill="#4c1d95">jailbreak · exfil · inject · abuse</text>
  <text x="430" y="960" font-family="system-ui" font-size="14" font-weight="600" fill="#5b21b6">→ agent   1 got through</text>
</svg>